; ClaudeKey Firmware — Dual Version Build
;
; Build Lite:  pio run -e lite
; Build Pro:   pio run -e pro
; Upload:      pio run -e <lite|pro> --target upload

[platformio]
default_envs = lite

[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -DUSE_TINYUSB

lib_deps =
    adafruit/Adafruit TinyUSB Library@^3.0.0
    adafruit/Adafruit NeoPixel@^1.12.0

; ── Lite: 6 keys + LED strip + mic + buzzer ──
[env:lite]
extends = common
build_flags =
    ${common.build_flags}
    -DCLAUDEKEY_LITE

; ── Pro: Lite + TFT display + rotary encoder + extra keys ──
[env:pro]
extends = common
build_flags =
    ${common.build_flags}
    -DCLAUDEKEY_PRO
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
    adafruit/Adafruit GFX Library@^1.11.0
